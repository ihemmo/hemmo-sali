<!DOCTYPE html>

<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treeni">
<meta name="theme-color" content="#0a0a0a">
<title>Kuntosalitreeni</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--card:#141414;--card2:#1a1a1a;--border:#252525;--border2:#333;--text:#e8e8e8;--muted:#666;--accent:#ff3e00;--accent2:#ff6b3d;--green:#00e676;--yellow:#ffd600;--blue:#40c4ff;--done-bg:#0d1a0d;--done-text:#2a5a2a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--text);min-height:100dvh;padding:0;overflow-x:hidden}
#app{max-width:500px;margin:0 auto;padding:12px;padding-top:max(12px,env(safe-area-inset-top));padding-bottom:max(160px,calc(env(safe-area-inset-bottom)+160px));min-height:100dvh}

/* === SHARED === */
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(–accent)}
.hdr-title{font-family:‘Oswald’,sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(–accent)}
.hdr-sub{font-size:10px;color:var(–muted);margin-top:2px}
.hdr-back{background:none;border:none;color:var(–muted);font-size:22px;cursor:pointer;padding:4px 8px;font-family:‘Oswald’,sans-serif}
.hdr-back:active{color:var(–text)}

.card{background:var(–card);border:1px solid var(–border);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.label{font-family:‘Oswald’,sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(–muted);margin-bottom:8px;text-transform:uppercase}

.btn{padding:12px 24px;border-radius:8px;border:2px solid var(–border);background:var(–card);color:var(–text);font-family:‘Oswald’,sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:8px}
.btn:active{transform:scale(.95)}
.btn.primary{background:var(–accent);border-color:var(–accent);color:#fff}
.btn.green{background:var(–green);border-color:var(–green);color:#000}
.btn.danger{border-color:#600;color:#f44}
.btn.blue{background:var(–blue);border-color:var(–blue);color:#000}
.btn.sm{padding:8px 14px;font-size:11px}
.btn.full{width:100%;justify-content:center}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

.input{width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(–border);background:var(–card2);color:var(–text);font-family:‘IBM Plex Mono’,monospace;font-size:13px;outline:none}
.input:focus{border-color:var(–accent)}
.input-sm{padding:8px 10px;font-size:12px}
.input-label{font-size:10px;color:var(–muted);margin-bottom:4px;display:block}
.input-group{margin-bottom:10px}
.checkbox-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(–muted);cursor:pointer;padding:4px 0}
.checkbox-row input{accent-color:var(–accent);width:16px;height:16px}

/* === HOME === */
.home-icon{font-size:48px;text-align:center;margin:30px 0 10px}
.home-title{font-family:‘Oswald’,sans-serif;font-size:28px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(–accent);text-align:center;margin-bottom:20px}

.prog-card{background:var(–card);border:1px solid var(–border);border-radius:10px;padding:16px;margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative}
.prog-card:active{transform:scale(.98);border-color:var(–accent)}
.prog-card-name{font-family:‘Oswald’,sans-serif;font-size:18px;font-weight:600;color:var(–text);margin-bottom:4px}
.prog-card-info{font-size:10px;color:var(–muted)}
.prog-card-actions{position:absolute;top:12px;right:12px;display:flex;gap:4px}
.prog-card-btn{background:none;border:1px solid var(–border);border-radius:4px;color:var(–muted);font-size:11px;padding:4px 8px;cursor:pointer;font-family:‘IBM Plex Mono’,monospace}
.prog-card-btn:active{color:var(–text);border-color:var(–text)}
.prog-card-btn.del{color:#800;border-color:#400}

/* === EDIT === */
.edit-sec{background:var(–card);border:1px solid var(–border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.edit-sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(–border);background:var(–card2)}
.edit-sec-name{font-family:‘Oswald’,sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(–accent);flex:1}
.edit-sec-name input{font-family:‘Oswald’,sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(–accent);background:transparent;border:none;border-bottom:1px solid var(–border);outline:none;width:100%;padding:2px 0}
.edit-sec-btns{display:flex;gap:4px}
.edit-sec-btn{background:none;border:none;color:var(–muted);font-size:16px;cursor:pointer;padding:2px 6px}
.edit-sec-btn:active{color:var(–text)}
.edit-sec-btn.del{color:#800}

.edit-ex{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;border-bottom:1px solid #111}
.edit-ex:last-child{border-bottom:none}
.edit-ex-grip{color:var(–muted);font-size:14px;padding-top:8px;cursor:grab;user-select:none}
.edit-ex-fields{flex:1;display:flex;flex-direction:column;gap:4px}
.edit-ex-row{display:flex;gap:6px;align-items:center}
.edit-ex-row input{flex:1}
.edit-ex-row .narrow{max-width:60px}
.edit-ex-del{background:none;border:none;color:#600;font-size:14px;cursor:pointer;padding:8px 4px}

.edit-add-ex{padding:8px 14px}
.edit-add-ex button{background:none;border:1px dashed var(–border);border-radius:6px;color:var(–muted);font-size:11px;padding:8px;width:100%;cursor:pointer;font-family:‘IBM Plex Mono’,monospace}
.edit-add-ex button:active{border-color:var(–accent);color:var(–accent)}

/* === WORKOUT === */
.wtimer{font-family:‘Oswald’,sans-serif;font-size:28px;font-weight:600;color:var(–text);font-variant-numeric:tabular-nums;text-align:right}
.wtimer-date{font-size:10px;color:var(–muted)}

.prog-bar{height:4px;background:var(–card2);border-radius:2px;overflow:hidden;margin-bottom:4px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(–accent),var(–accent2));border-radius:2px;transition:width .4s}
.prog-text{display:flex;justify-content:space-between;font-size:10px;color:var(–muted);margin-bottom:14px}

.sec-hdr{font-family:‘Oswald’,sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(–muted);padding:10px 0 6px;margin-top:6px;border-top:1px solid var(–border);display:flex;justify-content:space-between}
.sec-hdr.active{color:var(–accent);border-top-color:var(–accent)}
.sec-hdr.done{color:var(–done-text);border-top-color:#1a2a1a}
.sec-time{font-family:‘IBM Plex Mono’,monospace;font-size:11px;font-weight:400}

.ex{display:flex;align-items:center;gap:12px;padding:10px 12px;margin:3px 0;border-radius:8px;background:var(–card);border:1px solid var(–border);cursor:pointer;transition:all .2s}
.ex:active{transform:scale(.98)}
.ex.current{background:linear-gradient(135deg,#1a0800,#140a00);border:2px solid var(–accent);padding:18px 14px;margin:8px 0;box-shadow:0 0 20px rgba(255,62,0,.15);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 15px rgba(255,62,0,.1)}50%{box-shadow:0 0 25px rgba(255,62,0,.25)}}
.ex.current .ex-name{font-size:22px;color:#fff}
.ex.current .ex-detail{font-size:13px;color:var(–accent2)}
.ex.done{background:var(–done-bg);border-color:#1a2a1a;opacity:.55}
.ex.done .ex-name{text-decoration:line-through;color:var(–done-text)}
.ex.done .ex-detail{color:var(–done-text)}
.ex.upcoming{opacity:.35}
.ex-check{width:28px;height:28px;min-width:28px;border-radius:6px;border:2px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:16px;color:transparent}
.ex.done .ex-check{border-color:var(–green);background:rgba(0,230,118,.1);color:var(–green)}
.ex.current .ex-check{border-color:var(–accent);width:34px;height:34px;min-width:34px}
.ex-info{flex:1;min-width:0}
.ex-name{font-family:‘Oswald’,sans-serif;font-size:14px;font-weight:500;letter-spacing:.5px}
.ex-detail{font-size:10px;color:var(–muted);margin-top:2px}
.ex-right{text-align:right;min-width:44px}
.ex-cd{font-family:‘Oswald’,sans-serif;font-size:20px;font-weight:600;color:var(–yellow)}
.ex-elapsed{font-family:‘IBM Plex Mono’,monospace;font-size:13px;color:var(–accent);font-variant-numeric:tabular-nums}
.ex-dur{font-size:9px;color:var(–done-text)}

.bottom{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(–bg) 20%);padding:20px 12px max(12px,env(safe-area-inset-bottom));display:flex;justify-content:center;gap:10px;z-index:20}

/* === STATS === */
.stat-card{background:var(–card);border:1px solid var(–border);border-radius:8px;padding:12px;margin-bottom:8px}
.stat-val{font-family:‘Oswald’,sans-serif;font-size:24px;font-weight:600;color:var(–accent)}
.stat-label{font-size:10px;color:var(–muted);margin-top:2px}
.stat-row{display:flex;gap:8px}
.stat-row .stat-card{flex:1}
.stat-bar-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px}
.stat-bar-label{width:80px;color:var(–muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:10px}
.stat-bar-track{flex:1;height:6px;background:var(–card2);border-radius:3px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:3px;background:var(–accent)}
.stat-bar-val{width:50px;text-align:right;color:var(–muted);font-size:10px;font-variant-numeric:tabular-nums}

.tabs{display:flex;gap:2px;margin-bottom:14px;background:var(–card);border-radius:8px;padding:3px;border:1px solid var(–border)}
.tab{flex:1;padding:8px;text-align:center;font-family:‘Oswald’,sans-serif;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(–muted);cursor:pointer;border-radius:6px;border:none;background:none}
.tab.active{background:var(–accent);color:#fff}
.tab:active{opacity:.8}
</style>

</head>
<body>
<div id="app"></div>
<div class="bottom" id="btm" style="display:none"></div>
<script>
// ============ DATA ============
const DEFAULT_PROGRAMS = [{
  id:"kuntopiiri-1",name:"Kuntopiiri",
  sections:[
    {name:"Alkuverryttely",exercises:[
      {name:"Soutulaite / crosstrainer",detail:"5 min kevyt vauhti",timed:true,seconds:300},
      {name:"Vartalonkierto kepillä",detail:"10 / suunta",timed:false,seconds:0},
      {name:"Jalkaheilurit",detail:"10 / jalka",timed:false,seconds:0},
      {name:"Kyykkyvenytys",detail:"10 toistoa",timed:false,seconds:0},
      {name:"Olkapään pyöritys",detail:"10 eteen + 10 taakse",timed:false,seconds:0},
    ]},
    {name:"Kierros 1",exercises:[
      {name:"Jalkakyykky",detail:"12 toistoa — tanko tai käsipainot",timed:false,seconds:0},
      {name:"Penkkipunnerrus",detail:"10 toistoa",timed:false,seconds:0},
      {name:"Kulmasoutu",detail:"12 toistoa — käsipainoilla",timed:false,seconds:0},
      {name:"Askelkyykky",detail:"10 / jalka",timed:false,seconds:0},
      {name:"Pystypunnerrus",detail:"10 toistoa — käsipainoilla",timed:false,seconds:0},
      {name:"Vatsarutistus",detail:"15 toistoa",timed:false,seconds:0},
      {name:"Lepo",detail:"60–90 sek",timed:true,seconds:90},
    ]},
    {name:"Kierros 2",exercises:[
      {name:"Jalkakyykky",detail:"12 toistoa",timed:false,seconds:0},
      {name:"Penkkipunnerrus",detail:"10 toistoa",timed:false,seconds:0},
      {name:"Kulmasoutu",detail:"12 toistoa",timed:false,seconds:0},
      {name:"Askelkyykky",detail:"10 / jalka",timed:false,seconds:0},
      {name:"Pystypunnerrus",detail:"10 toistoa",timed:false,seconds:0},
      {name:"Vatsarutistus",detail:"15 toistoa",timed:false,seconds:0},
      {name:"Lepo",detail:"60–90 sek",timed:true,seconds:90},
    ]},
    {name:"Kierros 3",exercises:[
      {name:"Jalkakyykky",detail:"12 toistoa",timed:false,seconds:0},
      {name:"Penkkipunnerrus",detail:"10 toistoa",timed:false,seconds:0},
      {name:"Kulmasoutu",detail:"12 toistoa",timed:false,seconds:0},
      {name:"Askelkyykky",detail:"10 / jalka",timed:false,seconds:0},
      {name:"Pystypunnerrus",detail:"10 toistoa",timed:false,seconds:0},
      {name:"Vatsarutistus",detail:"15 toistoa",timed:false,seconds:0},
    ]}
  ]
}];

// ============ STORAGE ============
function getPrograms(){try{const d=JSON.parse(localStorage.getItem(“gym_progs”));return d&&d.length?d:null}catch{return null}}
function savePrograms(p){localStorage.setItem(“gym_progs”,JSON.stringify(p))}
function initPrograms(){if(!getPrograms())savePrograms(DEFAULT_PROGRAMS)}
function getHistory(){try{return JSON.parse(localStorage.getItem(“gym_hist”)||”[]”)}catch{return[]}}
function saveHistory(e){const h=getHistory();h.unshift(e);if(h.length>200)h.length=200;localStorage.setItem(“gym_hist”,JSON.stringify(h))}

initPrograms();

// ============ STATE ============
let view=“home”; // home | edit | workout | stats
let editProg=null; // program being edited
let statsProg=null;
let homeTab=“programs”; // programs | history
let W={phase:“idle”,ci:0,exs:[],t0:null,secT:{},exStart:null,cdLeft:0,progId:null,progName:””};
let timers={t:null,cd:null};

// ============ HELPERS ============
const pad=n=>n.toString().padStart(2,“0”);
const uid=()=>“p-”+Date.now()+”-”+Math.random().toString(36).slice(2,7);
function fD(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);return h?`${h}:${pad(m%60)}:${pad(s%60)}`:`${m}:${pad(s%60)}`}
function fS(ms){const s=Math.floor(ms/1000);return s<60?`${s}s`:`${Math.floor(s/60)}m${pad(s%60)}s`}
function fC(s){const m=Math.floor(s/60);return m?`${m}:${pad(s%60)}`:`${s}`}
function fT(d){return`${pad(d.getHours())}:${pad(d.getMinutes())}`}
function fDt(d){const ds=[“su”,“ma”,“ti”,“ke”,“to”,“pe”,“la”];return`${ds[d.getDay()]} ${d.getDate()}.${d.getMonth()+1}.`}
function fDF(d){return`${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`}
function flatExs(prog){const l=[];prog.sections.forEach((s,si)=>s.exercises.forEach(e=>l.push({…e,sec:s.name,si})));return l}
function countExs(prog){return prog.sections.reduce((s,sec)=>s+sec.exercises.length,0)}

// ============ ACTIONS ============
function goHome(){view=“home”;clearTimers();render()}
function goEdit(prog){
editProg=prog?JSON.parse(JSON.stringify(prog)):{id:uid(),name:“Uusi ohjelma”,sections:[{name:“Osio 1”,exercises:[{name:””,detail:””,timed:false,seconds:0}]}]};
view=“edit”;render();
}
function goStats(progId){statsProg=progId;view=“stats”;render()}

function saveProg(){
if(!editProg.name.trim())return alert(“Anna ohjelmalle nimi”);
const progs=getPrograms()||[];
const idx=progs.findIndex(p=>p.id===editProg.id);
// Clean empty exercises
editProg.sections.forEach(s=>{s.exercises=s.exercises.filter(e=>e.name.trim())});
editProg.sections=editProg.sections.filter(s=>s.exercises.length>0);
if(editProg.sections.length===0)return alert(“Lisää vähintään yksi osio ja liike”);
if(idx>=0)progs[idx]=editProg;else progs.push(editProg);
savePrograms(progs);goHome();
}

function dupProg(prog){
const progs=getPrograms()||[];
const copy={…JSON.parse(JSON.stringify(prog)),id:uid(),name:prog.name+” (kopio)”};
progs.push(copy);savePrograms(progs);render();
}

function delProg(id){
if(!confirm(“Poista ohjelma?”))return;
const progs=(getPrograms()||[]).filter(p=>p.id!==id);
savePrograms(progs);render();
}

function clearTimers(){clearInterval(timers.t);clearInterval(timers.cd)}

function startWorkout(prog){
W={phase:“active”,ci:0,exs:flatExs(prog).map(e=>({…e,done:false,dur:0})),t0:Date.now(),secT:{},exStart:Date.now(),cdLeft:0,progId:prog.id,progName:prog.name};
W.secT[W.exs[0].sec]={start:Date.now()};
clearTimers();timers.t=setInterval(render,1000);
if(W.exs[0].timed)startCd(W.exs[0].seconds);
view=“workout”;render();
}

function startCd(sec){
W.cdLeft=sec;clearInterval(timers.cd);
timers.cd=setInterval(()=>{W.cdLeft–;if(W.cdLeft<=0){clearInterval(timers.cd);W.cdLeft=0;if(navigator.vibrate)navigator.vibrate([200,100,200])}render()},1000);
}

function complete(i){
if(i!==W.ci||W.exs[i].done)return;
const now=Date.now();W.exs[i].done=true;W.exs[i].dur=now-W.exStart;
const cs=W.exs[i].sec,ni=i+1;
if(ni<W.exs.length){
W.ci=ni;W.exStart=now;
const ns=W.exs[ni].sec;
if(ns!==cs){W.secT[cs].end=now;W.secT[cs].dur=now-W.secT[cs].start;W.secT[ns]={start:now}}
clearInterval(timers.cd);W.cdLeft=0;
if(W.exs[ni].timed)startCd(W.exs[ni].seconds);
setTimeout(()=>{const el=document.getElementById(`ex-${ni}`);if(el){el.scrollIntoView({behavior:“smooth”,block:“center”});setTimeout(()=>{const r=el.getBoundingClientRect();if(r.bottom>window.innerHeight-100)el.scrollIntoView({behavior:“smooth”,block:“start”})},400)}},100);
}else{
W.secT[cs].end=now;W.secT[cs].dur=now-W.secT[cs].start;
W.phase=“finished”;clearTimers();
saveHistory({date:new Date().toISOString(),dur:now-W.t0,progId:W.progId,progName:W.progName,secs:{…W.secT},exDurs:W.exs.map(e=>({name:e.name,sec:e.sec,dur:e.dur})),done:W.exs.filter(e=>e.done).length,total:W.exs.length});
}
if(navigator.vibrate)navigator.vibrate(50);
render();
}

function resetWorkout(){W.phase=“idle”;clearTimers();goHome()}

// ============ RENDER ============
function render(){
const app=document.getElementById(“app”),btm=document.getElementById(“btm”),now=new Date();
btm.style.display=“none”;

if(view===“home”){renderHome(app,now);return}
if(view===“edit”){renderEdit(app);return}
if(view===“stats”){renderStats(app);return}
if(view===“workout”){renderWorkout(app,now,btm);return}
}

function renderHome(app,now){
const progs=getPrograms()||[];
const hist=getHistory();
app.innerHTML=`
<div style="text-align:center;margin:20px 0 16px"><span style="font-size:48px">🏋️</span></div>
<div style="font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--accent);text-align:center;margin-bottom:20px">Treeni</div>

```
<div class="tabs">
  <button class="tab ${homeTab==="programs"?"active":""}" onclick="homeTab='programs';render()">Ohjelmat</button>
  <button class="tab ${homeTab==="history"?"active":""}" onclick="homeTab='history';render()">Historia</button>
</div>

${homeTab==="programs"?`
  ${progs.map(p=>`
    <div class="prog-card" onclick="startWorkout(getPrograms().find(x=>x.id==='${p.id}'))">
      <div class="prog-card-actions">
        <button class="prog-card-btn" onclick="event.stopPropagation();goStats('${p.id}')">📊</button>
        <button class="prog-card-btn" onclick="event.stopPropagation();goEdit(getPrograms().find(x=>x.id==='${p.id}'))">✏️</button>
        <button class="prog-card-btn" onclick="event.stopPropagation();dupProg(getPrograms().find(x=>x.id==='${p.id}'))">📋</button>
        ${progs.length>1?`<button class="prog-card-btn del" onclick="event.stopPropagation();delProg('${p.id}')">🗑</button>`:""}
      </div>
      <div class="prog-card-name">${esc(p.name)}</div>
      <div class="prog-card-info">${p.sections.length} osiota · ${countExs(p)} liikettä</div>
    </div>
  `).join("")}
  <button class="btn full" style="margin-top:8px" onclick="goEdit(null)">+ Uusi ohjelma</button>
`:`
  ${hist.length?`
    ${hist.map(h=>{const d=new Date(h.date);return`
      <div class="stat-bar-row" style="padding:8px 12px;background:var(--card);border-radius:6px;margin-bottom:4px;border:1px solid var(--border)">

  `:`<div style="text-align:center;color:var(--muted);padding:40px;font-size:12px">Ei vielä treenejä</div>`}
`}

`;
}

function renderStats(app){
const hist=getHistory().filter(h=>h.progId===statsProg);
const prog=(getPrograms()||[]).find(p=>p.id===statsProg);
const name=prog?prog.name:(hist[0]?hist[0].progName:”—”);

app.innerHTML=`<div class="hdr"> <button class="hdr-back" onclick="goHome()">←</button> <div><div class="hdr-title">${esc(name)}</div><div class="hdr-sub">Tilastot</div></div> </div>`;

if(!hist.length){app.innerHTML+=`<div style="text-align:center;color:var(--muted);padding:40px;font-size:12px">Ei vielä treenejä tällä ohjelmalla</div>`;return}

const avgDur=hist.reduce((s,h)=>s+h.dur,0)/hist.length;
const bestDur=Math.min(…hist.map(h=>h.dur));
const lastDur=hist[0].dur;

// Section averages from latest
let secAvgs={};
hist.slice(0,10).forEach(h=>{
if(!h.secs)return;
Object.entries(h.secs).forEach(([name,t])=>{
if(!t.dur)return;
if(!secAvgs[name])secAvgs[name]={total:0,count:0};
secAvgs[name].total+=t.dur;secAvgs[name].count++;
});
});
const maxSecAvg=Math.max(…Object.values(secAvgs).map(s=>s.total/s.count),1);

// Per-exercise averages from recent
let exAvgs={};
hist.slice(0,10).forEach(h=>{
if(!h.exDurs)return;
h.exDurs.forEach(e=>{
if(!e.dur)return;
const k=e.sec+”//”+e.name;
if(!exAvgs[k])exAvgs[k]={name:e.name,sec:e.sec,total:0,count:0};
exAvgs[k].total+=e.dur;exAvgs[k].count++;
});
});

// Recent trend (last 10)
const recent=hist.slice(0,10).reverse();

app.innerHTML+=`
<div class="stat-row">
<div class="stat-card"><div class="stat-val">${hist.length}</div><div class="stat-label">Treenejä yhteensä</div></div>
<div class="stat-card"><div class="stat-val">${fD(avgDur)}</div><div class="stat-label">Keskiaika</div></div>
<div class="stat-card"><div class="stat-val" style="color:var(--green)">${fD(bestDur)}</div><div class="stat-label">Paras aika</div></div>
</div>

```
<div class="card">
  <div class="label">Viimeisin treeni</div>
  <div style="font-size:12px;color:var(--muted)">${fDF(new Date(hist[0].date))} klo ${fT(new Date(hist[0].date))}</div>
  <div style="font-family:'Oswald',sans-serif;font-size:22px;color:var(--accent);margin-top:4px">${fD(lastDur)}</div>
</div>

${Object.keys(secAvgs).length?`
<div class="card">
  <div class="label">Osioiden keskiajat (viim. 10)</div>
  ${Object.entries(secAvgs).map(([name,s])=>{
    const avg=s.total/s.count;
    return`<div class="stat-bar-row"><span class="stat-bar-label">${esc(name)}</span><div class="stat-bar-track"><div class="stat-bar-fill" style="width:${(avg/maxSecAvg*100).toFixed(0)}%"></div></div><span class="stat-bar-val">${fS(avg)}</span></div>`;
  }).join("")}
</div>`:""}

${recent.length>1?`
<div class="card">
  <div class="label">Kokonaisajan kehitys</div>
  <div style="display:flex;align-items:flex-end;height:80px;gap:3px;padding-top:8px">
    ${recent.map((h,i)=>{
      const maxD=Math.max(...recent.map(r=>r.dur));
      const ht=Math.max((h.dur/maxD)*100,5);
      const isLast=i===recent.length-1;
      return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%">
        <div style="font-size:8px;color:var(--muted);margin-bottom:2px">${fD(h.dur)}</div>
        <div style="width:100%;height:${ht}%;background:${isLast?"var(--accent)":"var(--border2)"};border-radius:2px 2px 0 0"></div>
      </div>`;
    }).join("")}
  </div>
</div>`:""}

${Object.keys(exAvgs).length?`
<div class="card">
  <div class="label">Liikekohtaiset keskiajat (viim. 10)</div>
  ${Object.values(exAvgs).filter(e=>e.name!=="Lepo").slice(0,15).map(e=>{
    const avg=e.total/e.count;const mx=Math.max(...Object.values(exAvgs).map(x=>x.total/x.count),1);
    return`<div class="stat-bar-row"><span class="stat-bar-label" title="${esc(e.sec)}">${esc(e.name)}</span><div class="stat-bar-track"><div class="stat-bar-fill" style="width:${(avg/mx*100).toFixed(0)}%;background:var(--blue)"></div></div><span class="stat-bar-val">${fS(avg)}</span></div>`;
  }).join("")}
</div>`:""}
```

`;
}

function renderWorkout(app,now,btm){
if(W.phase===“finished”){
btm.style.display=“none”;
const tot=Date.now()-W.t0;
app.innerHTML=` <div style="text-align:center;padding-top:40px"> <div style="font-size:64px">💪</div> <div style="font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--accent);margin:16px 0">${esc(W.progName)} valmis!</div> <div style="font-size:12px;color:var(--muted)">Kokonaisaika</div> <div style="font-family:'Oswald',sans-serif;font-size:36px;color:var(--accent);margin:4px 0 16px">${fD(tot)}</div> <div style="max-width:340px;margin:0 auto"> ${Object.entries(W.secT).map(([n,t])=>`<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:11px;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">${esc(n)}</span><span>${t.dur?fD(t.dur):”—”}</span></div>`).join("")} </div> <button class="btn primary" onclick="resetWorkout()" style="margin-top:24px;padding:14px 40px">TAKAISIN</button> </div>`;
return;
}

btm.style.display=“flex”;
const elapsed=Date.now()-W.t0,dc=W.exs.filter(e=>e.done).length,tc=W.exs.length,pct=Math.round(dc/tc*100);

let secs={};W.exs.forEach((e,i)=>{if(!secs[e.sec])secs[e.sec]={exs:[]};secs[e.sec].exs.push({…e,gi:i})});

let h=` <div class="hdr"> <div><div class="hdr-title">${esc(W.progName)}</div><div class="hdr-sub">${dc}/${tc} liikettä</div></div> <div style="text-align:right"><div class="wtimer">${fD(elapsed)}</div><div class="wtimer-date">${fDt(now)}</div></div> </div> <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div> <div class="prog-text"><span>${pct}%</span><span>${dc}/${tc}</span></div>`;

for(const[sn,sec] of Object.entries(secs)){
const allD=sec.exs.every(e=>e.done),isA=sec.exs.some(e=>e.gi===W.ci);
const st=W.secT[sn],sd=st&&st.dur?fS(st.dur):isA&&st?fS(Date.now()-st.start):””;
h+=`<div class="sec-hdr ${isA?"active":allD?"done":""}"><span>${esc(sn)}</span><span class="sec-time">${sd}</span></div>`;

```
for(const ex of sec.exs){
  const isC=ex.gi===W.ci,isD=ex.done,cls=isC?"current":isD?"done":"upcoming";
  let timer="";
  if(isC&&ex.timed&&W.cdLeft>0)timer=`<div class="ex-cd">${fC(W.cdLeft)}</div>`;
  else if(isC)timer=`<div class="ex-elapsed">${fD(Date.now()-W.exStart)}</div>`;
  else if(isD&&ex.dur)timer=`<div class="ex-dur">${fS(ex.dur)}</div>`;

  h+=`<div class="ex ${cls}" id="ex-${ex.gi}" onclick="${isC?`complete(${ex.gi})`:""}"">
    <div class="ex-check">${isD?"✓":""}</div>
    <div class="ex-info"><div class="ex-name">${esc(ex.name)}</div><div class="ex-detail">${esc(ex.detail)}</div></div>
    <div class="ex-right">${timer}</div></div>`;
}
```

}
h+=`<div style="height:180px"></div>`;
app.innerHTML=h;
btm.innerHTML=` <button class="btn danger" onclick="if(confirm('Keskeytä treeni?'))resetWorkout()">LOPETA</button> <button class="btn primary" onclick="complete(${W.ci})">${W.ci<W.exs.length-1?"VALMIS ✓":"VIIMEINEN ✓"}</button>`;
}

// ============ EDIT HELPERS ============
function addSection(){editProg.sections.push({name:`Osio ${editProg.sections.length+1}`,exercises:[{name:””,detail:””,timed:false,seconds:0}]});render()}
function removeSection(si){if(editProg.sections.length<2)return;editProg.sections.splice(si,1);render()}
function moveSection(si,dir){const t=editProg.sections[si];editProg.sections[si]=editProg.sections[si+dir];editProg.sections[si+dir]=t;render()}
function addEx(si){editProg.sections[si].exercises.push({name:””,detail:””,timed:false,seconds:0});render()}
function removeEx(si,ei){editProg.sections[si].exercises.splice(ei,1);render()}
function moveEx(si,ei,dir){const exs=editProg.sections[si].exercises,t=exs[ei];exs[ei]=exs[ei+dir];exs[ei+dir]=t;render()}

function esc(s){if(!s)return””;return s.replace(/&/g,”&”).replace(/</g,”<”).replace(/>/g,”>”).replace(/”/g,”"”)}

render();
</script>
