<style>

.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.green{background:var(--green);border-color:var(--green);color:#000}

.input{width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none}
.input:focus{border-color:var(--accent)}
.input-sm{padding:8px 10px;font-size:12px}

.prog-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative}
.prog-card:active{transform:scale(.98);border-color:var(--accent)}
.prog-card-name{font-family:'Oswald',sans-serif;font-size:18px;font-weight:600;color:var(--text);margin-bottom:4px}
.prog-card-info{font-size:10px;color:var(--muted)}
.prog-card-actions{position:absolute;top:12px;right:12px;display:flex;gap:4px}
.prog-card-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:11px;padding:4px 8px;cursor:pointer;font-family:'IBM Plex Mono',monospace}
.prog-card-btn.del{color:#800;border-color:#400}
.edit-sec{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.edit-sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--card2)}
.edit-sec-name input{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--accent);background:transparent;border:none;border-bottom:1px solid var(--border);outline:none;width:100%;padding:2px 0}
.edit-sec-btns{display:flex;gap:4px}
.edit-sec-btn{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 6px}
.edit-sec-btn.del{color:#800}
.edit-ex{display:flex;align-items:flex-start;gap:8px;padding:10px 14px;border-bottom:1px solid #111}
.edit-ex:last-child{border-bottom:none}
.edit-ex-grip{color:var(--muted);font-size:14px;padding-top:8px;cursor:grab;user-select:none}

.ex:active{transform:scale(.98)}
.ex.current{background:linear-gradient(135deg,#1a0800,#140a00);border:2px solid var(--accent);padding:18px 14px;margin:8px 0;box-shadow:0 0 20px rgba(255,62,0,.15);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 15px rgba(255,62,0,.1)}50%{box-shadow:0 0 25px rgba(255,62,0,.25)}}
.ex.current .ex-name{font-size:22px;color:#fff}
.ex.current .ex-detail{font-size:13px;color:var(--accent2)}
.ex.done{background:var(--done-bg);border-color:#1a2a1a;opacity:.55}
.ex.done .ex-name{text-decoration:line-through;color:var(--done-text)}
.ex.done .ex-detail{color:var(--done-text)}
.ex.upcoming{opacity:.35}
.ex-check{width:28px;height:28px;min-width:28px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;color:transparent}
.ex.done .ex-check{border-color:var(--green);background:rgba(0,230,118,.1);color:var(--green)}
.ex.current .ex-check{border-color:var(--accent);width:34px;height:34px;min-width:34px}
.ex-info{flex:1;min-width:0}
.ex-name{font-family:'Oswald',sans-serif;font-size:14px;font-weight:500;letter-spacing:.5px}
.ex-detail{font-size:10px;color:var(--muted);margin-top:2px}
.ex-right{text-align:right;min-width:44px}
.ex-cd{font-family:'Oswald',sans-serif;font-size:20px;font-weight:600;color:var(--yellow)}
.ex-elapsed{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--accent);font-variant-numeric:tabular-nums}
.ex-dur{font-size:9px;color:var(--done-text)}
.bottom{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 20%);padding:20px 12px max(12px,env(safe-area-inset-bottom));display:flex;justify-content:center;gap:10px;z-index:20}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px}
.stat-val{font-family:'Oswald',sans-serif;font-size:24px;font-weight:600;color:var(--accent)}
.stat-label{font-size:10px;color:var(--muted);margin-top:2px}
.stat-row{display:flex;gap:8px}
.stat-row .stat-card{flex:1}
.stat-bar-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px}
.stat-bar-label{width:80px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:10px}
.stat-bar-track{flex:1;height:6px;background:var(--card2);border-radius:3px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:3px;background:var(--accent)}
.stat-bar-val{width:50px;text-align:right;color:var(--muted);font-size:10px;font-variant-numeric:tabular-nums}
.tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--card);border-radius:8px;padding:3px;border:1px solid var(--border)}
.tab{flex:1;padding:8px;text-align:center;font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);cursor:pointer;border-radius:6px;border:none;background:none}
.tab.active{background:var(--accent);color:#fff}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--card);border-radius:6px;margin-bottom:4px;font-size:11px;border:1px solid var(--border)}
.summary-row{display:flex;justify-content:space-between;padding:6px 0;font-size:11px;border-bottom:1px solid var(--border)}
#errbox{display:none;background:#400;color:#faa;padding:16px;border-radius:8px;margin:20px;font-size:12px;word-break:break-all}
</style>
</head>

<script>

var Q=String.fromCharCode(34);
var DEFAULT_PROGRAMS=[{

sections:[
{name:‚ÄėAlkuverryttely‚Äô,exercises:[

{name:‚ÄėPenkkipunnerrus‚Äô,detail:‚Äė10 toistoa‚Äô,timed:false,seconds:0},

{name:‚ÄėKierros 2‚Äô,exercises:[
{name:‚ÄėJalkakyykky‚Äô,detail:‚Äė12 toistoa‚Äô,timed:false,seconds:0},
{name:‚ÄėPenkkipunnerrus‚Äô,detail:‚Äė10 toistoa‚Äô,timed:false,seconds:0},
{name:‚ÄėKulmasoutu‚Äô,detail:‚Äė12 toistoa‚Äô,timed:false,seconds:0},
{name:‚ÄėAskelkyykky‚Äô,detail:‚Äė10 / jalka‚Äô,timed:false,seconds:0},
{name:‚ÄėPystypunnerrus‚Äô,detail:‚Äė10 toistoa‚Äô,timed:false,seconds:0},
{name:‚ÄėVatsarutistus‚Äô,detail:‚Äė15 toistoa‚Äô,timed:false,seconds:0},
{name:‚ÄėLepo‚Äô,detail:‚Äė60-90 sek‚Äô,timed:true,seconds:90}
]},
{name:‚ÄėKierros 3‚Äô,exercises:[
{name:‚ÄėJalkakyykky‚Äô,detail:‚Äė12 toistoa‚Äô,timed:false,seconds:0},
{name:‚ÄėPenkkipunnerrus‚Äô,detail:‚Äė10 toistoa‚Äô,timed:false,seconds:0},
{name:‚ÄėKulmasoutu‚Äô,detail:‚Äė12 toistoa‚Äô,timed:false,seconds:0},
{name:‚ÄėAskelkyykky‚Äô,detail:‚Äė10 / jalka‚Äô,timed:false,seconds:0},
{name:‚ÄėPystypunnerrus‚Äô,detail:‚Äė10 toistoa‚Äô,timed:false,seconds:0},
{name:‚ÄėVatsarutistus‚Äô,detail:‚Äė15 toistoa‚Äô,timed:false,seconds:0}
]}
]
}];

function getPrograms(){try{var d=JSON.parse(localStorage.getItem(‚Äėgym_progs‚Äô));return(d&&d.length)?d:null;}catch(e){return null;}}
function savePrograms(p){localStorage.setItem(‚Äėgym_progs‚Äô,JSON.stringify(p));}
function initPrograms(){if(!getPrograms())savePrograms(JSON.parse(JSON.stringify(DEFAULT_PROGRAMS)));}
function getHistory(){try{return JSON.parse(localStorage.getItem(‚Äėgym_hist‚Äô)||‚Äô[]‚Äô);}catch(e){return[];}}
function saveHistory(e){var h=getHistory();h.unshift(e);if(h.length>200)h.length=200;localStorage.setItem(‚Äėgym_hist‚Äô,JSON.stringify(h));}
initPrograms();

var view=‚Äėhome‚Äô;
var editProg=null;
var statsProg=null;
var homeTab=‚Äėprograms‚Äô;
var W={phase:‚Äėidle‚Äô,ci:0,exs:[],t0:null,secT:{},exStart:null,cdLeft:0,progId:null,progName:‚Äô‚Äô};
var timerTotal=null;
var timerCd=null;

function pad2(n){return n<10?‚Äė0‚Äô+n:‚Äô‚Äô+n;}
function uid(){return ‚Äėp-‚Äô+Date.now()+‚Äô-‚Äô+Math.random().toString(36).substr(2,5);}
function fD(ms){var s=Math.floor(ms/1000);var m=Math.floor(s/60);var h=Math.floor(m/60);if(h>0)return h+‚Äô:‚Äô+pad2(m%60)+‚Äô:‚Äô+pad2(s%60);return m+‚Äô:‚Äô+pad2(s%60);}
function fS(ms){var s=Math.floor(ms/1000);if(s<60)return s+‚Äės‚Äô;return Math.floor(s/60)+‚Äėm‚Äô+pad2(s%60)+‚Äės‚Äô;}
function fC(s){var m=Math.floor(s/60);if(m>0)return m+‚Äô:‚Äô+pad2(s%60);return ‚Äė‚Äô+s;}
function fT(d){return pad2(d.getHours())+‚Äô:‚Äô+pad2(d.getMinutes());}
function fDt(d){var ds=[‚Äėsu‚Äô,‚Äėma‚Äô,‚Äėti‚Äô,‚Äėke‚Äô,‚Äėto‚Äô,‚Äėpe‚Äô,‚Äėla‚Äô];return ds[d.getDay()]+‚Äô ‚Äė+d.getDate()+‚Äô.‚Äô+(d.getMonth()+1)+‚Äô.‚Äô;}
function fDF(d){return d.getDate()+‚Äô.‚Äô+(d.getMonth()+1)+‚Äô.‚Äô+d.getFullYear();}
function esc(s){if(!s)return ‚Äė‚Äô;return s.replace(/&/g,‚Äô&‚Äô).replace(/</g,‚Äô<‚Äô).replace(/>/g,‚Äô>‚Äô).replace(/‚Äô/g,‚Äô'‚Äô);}
function qa(s){return s.replace(/‚Äô/g,‚Äô'‚Äô);}

function flatExs(prog){
var l=[];
for(var si=0;si<prog.sections.length;si++){
var sec=prog.sections[si];
for(var ei=0;ei<sec.exercises.length;ei++){
var ex=sec.exercises[ei];
l.push({name:ex.name,detail:ex.detail,timed:ex.timed,seconds:ex.seconds,sec:sec.name,si:si});
}
}
return l;
}
function countExs(prog){var c=0;for(var i=0;i<prog.sections.length;i++)c+=prog.sections[i].exercises.length;return c;}

function goHome(){view=‚Äėhome‚Äô;clearAllTimers();render();}
function goEdit(prog){
if(prog){editProg=JSON.parse(JSON.stringify(prog));}
else{editProg={id:uid(),name:‚ÄėUusi ohjelma‚Äô,sections:[{name:‚ÄėOsio 1‚Äô,exercises:[{name:‚Äô‚Äô,detail:‚Äô‚Äô,timed:false,seconds:0}]}]};}
view=‚Äėedit‚Äô;render();
}
function goStats(progId){statsProg=progId;view=‚Äėstats‚Äô;render();}

function saveProg(){
if(!editProg.name.trim()){alert(‚ÄėAnna ohjelmalle nimi‚Äô);return;}
var progs=getPrograms()||[];
var idx=-1;
for(var i=0;i<progs.length;i++){if(progs[i].id===editProg.id){idx=i;break;}}
for(var s=0;s<editProg.sections.length;s++){
editProg.sections[s].exercises=editProg.sections[s].exercises.filter(function(e){return e.name.trim();});
}
editProg.sections=editProg.sections.filter(function(s){return s.exercises.length>0;});
if(editProg.sections.length===0){alert(‚ÄėLisaa vahintaan yksi osio ja liike‚Äô);return;}
if(idx>=0)progs[idx]=editProg;else progs.push(editProg);
savePrograms(progs);goHome();
}
function dupProg(prog){
var progs=getPrograms()||[];
var copy=JSON.parse(JSON.stringify(prog));
copy.id=uid();copy.name=prog.name+‚Äô (kopio)‚Äô;
progs.push(copy);savePrograms(progs);render();
}
function delProg(id){
if(!confirm(‚ÄėPoista ohjelma?‚Äô))return;
var progs=(getPrograms()||[]).filter(function(p){return p.id!==id;});
savePrograms(progs);render();
}
function addSection(){editProg.sections.push({name:‚ÄėOsio ‚Äė+(editProg.sections.length+1),exercises:[{name:‚Äô‚Äô,detail:‚Äô‚Äô,timed:false,seconds:0}]});render();}
function removeSection(si){if(editProg.sections.length<2)return;editProg.sections.splice(si,1);render();}
function moveSection(si,dir){var t=editProg.sections[si];editProg.sections[si]=editProg.sections[si+dir];editProg.sections[si+dir]=t;render();}
function addEx(si){editProg.sections[si].exercises.push({name:‚Äô‚Äô,detail:‚Äô‚Äô,timed:false,seconds:0});render();}
function removeEx(si,ei){editProg.sections[si].exercises.splice(ei,1);render();}
function moveEx(si,ei,dir){var exs=editProg.sections[si].exercises;var t=exs[ei];exs[ei]=exs[ei+dir];exs[ei+dir]=t;render();}

function clearAllTimers(){clearInterval(timerTotal);clearInterval(timerCd);timerTotal=null;timerCd=null;}

function startWorkout(progId){
var progs=getPrograms()||[];
var prog=null;
for(var i=0;i<progs.length;i++){if(progs[i].id===progId){prog=progs[i];break;}}
if(!prog)return;
var exs=flatExs(prog);
W={phase:‚Äėactive‚Äô,ci:0,exs:[],t0:Date.now(),secT:{},exStart:Date.now(),cdLeft:0,progId:prog.id,progName:prog.name};
for(var j=0;j<exs.length;j++){W.exs.push({name:exs[j].name,detail:exs[j].detail,timed:exs[j].timed,seconds:exs[j].seconds,sec:exs[j].sec,si:exs[j].si,done:false,dur:0});}
W.secT[W.exs[0].sec]={start:Date.now()};
clearAllTimers();
timerTotal=setInterval(render,1000);
if(W.exs[0].timed)startCd(W.exs[0].seconds);
view=‚Äėworkout‚Äô;render();
}

function startCd(sec){
